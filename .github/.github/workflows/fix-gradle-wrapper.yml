name: Fix Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  fix-gradle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Fix gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.6
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.properties
          git commit -m "fix: Update gradle wrapper jar" || true
          git push
