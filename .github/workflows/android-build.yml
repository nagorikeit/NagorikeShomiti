name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android App (APK)
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Set up Java JDK (Android builds require JDK)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Step 3: Grant execution permission for gradlew
    # This ensures Linux can execute the Gradle wrapper without permission errors
    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    # Step 4: Build the Android application
    # This compiles the source code and produces a debug APK
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # Step 5: Upload the generated APK as a build artifact
    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
