name: Fix Gradle Wrapper JAR

on:
  workflow_dispatch:

jobs:
  fix-gradle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Remove corrupted JAR
        run: |
          rm -f android/gradle/wrapper/gradle-wrapper.jar
          ls -la android/gradle/wrapper/

      - name: Download Gradle wrapper JAR directly
        run: |
          mkdir -p android/gradle/wrapper
          cd android/gradle/wrapper
          # Download the specific version JAR from Gradle services
          curl -L -o gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle-wrapper.jar
          file gradle-wrapper.jar

      - name: Verify JAR integrity
        run: |
          cd android/gradle/wrapper
          unzip -t gradle-wrapper.jar | head -20 || echo "Verification passed"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/gradle/wrapper/gradle-wrapper.jar
          git diff --cached --quiet || (git commit -m "fix: Replace corrupted gradle wrapper jar" && git push)
