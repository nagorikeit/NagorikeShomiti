name: Fix Gradle Wrapper JAR

on:
  workflow_dispatch:

jobs:
  fix-gradle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.6

      - name: Remove old JAR and regenerate
        run: |
          cd android
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.6
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add android/gradle/wrapper/gradle-wrapper.jar
          git add android/gradle/wrapper/gradle-wrapper.properties
          git commit -m "fix: Regenerate gradle wrapper jar" || echo "No changes"
          git push
