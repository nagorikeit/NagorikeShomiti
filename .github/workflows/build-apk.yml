name: Build Android APK (সমিতি ম্যানেজার)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Java Development Kit (JDK) 21 for Gradle
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle' # Automatically caches Gradle dependencies for faster subsequent runs

      # Step 3: Set up Node.js v22 (Required by latest Capacitor CLI)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Automatically caches npm packages

      # Step 4: Install web dependencies cleanly and securely
      - name: Install Node.js Dependencies
        run: npm ci

      # Step 5: Build the frontend web application (creates /dist directory)
      - name: Build Web Application
        run: npm run build

      # Step 6: Sync web assets and plugins into the Android project
      - name: Sync Capacitor
        run: npx cap sync

      # Step 7: Regenerate the Gradle Wrapper to prevent binary corruption on Git push/checkout
      - name: Regenerate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.14.3 --distribution-type all

      # Step 8: Make Gradle wrapper script executable
      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      # Step 9: Build the Debug and Unsigned Release APKs using Gradle
      - name: Build APKs with Gradle
        run: |
          cd android
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      # Step 10: Upload Debug APK as a build artifact
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Step 11: Upload Unsigned Release APK as a build artifact
      - name: Upload Unsigned Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

